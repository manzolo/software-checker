services:
  db:
    image: postgres:16-alpine
    container_name: ${DB_CONTAINER_NAME:-softwarechecker-db}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-softwarechecker}
      POSTGRES_USER: ${DB_USER:-checker}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      default:
        aliases:
          - ${DB_HOST:-db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-checker} -d ${DB_NAME:-softwarechecker}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ${BACKEND_CONTAINER_NAME:-softwarechecker-backend}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgres://${DB_USER:-checker}:${DB_PASSWORD}@${DB_HOST:-db}:${DB_PORT:-5432}/${DB_NAME:-softwarechecker}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@example.com}
      PORT: ${PORT:-3000}

  frontend:
    build: ./frontend
    container_name: ${FRONTEND_CONTAINER_NAME:-softwarechecker-frontend}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  pgdata:
