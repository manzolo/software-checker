<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#4F46E5"/>
  <!-- Box/package shape -->
  <rect x="8" y="12" width="16" height="13" rx="1.5" fill="none" stroke="white" stroke-width="1.8"/>
  <!-- Box lid -->
  <polyline points="8,12 16,8 24,12" fill="none" stroke="white" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Center line on lid -->
  <line x1="16" y1="8" x2="16" y2="12" stroke="white" stroke-width="1.8"/>
  <!-- Checkmark -->
  <polyline points="12,19 15,22 21,16" fill="none" stroke="#A5F3FC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
